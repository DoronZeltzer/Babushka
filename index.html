<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>בבושקה • חנות יד שניה • רגבה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@300;400;500;700&family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/i18n.js"></script>
  <script src="js/legal.js"></script>
</head>
<body data-page="customer">

  <header class="site-header">
    <div class="header-inner">
      <a class="logo-link" href="index.html">
        <img src="assets/logo.jpg" alt="" class="logo-img">
        <img src="assets/logo-text.jpg" alt="בבושקה - חנות יד שניה ברגבה" class="logo-wordmark"
             data-i18n-attr="alt:pageTitleCustomer">
      </a>
      <nav class="header-nav">
        <a href="contact.html" class="nav-link" data-i18n="navContact">צור קשר</a>
        <button id="lang-toggle" class="nav-link nav-link-lang" data-i18n="langSwitch">EN</button>
        <a href="https://www.facebook.com/babushka.regba/" target="_blank" rel="noopener" class="nav-link nav-link-fb" aria-label="Facebook">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
            <path d="M12 0C5.373 0 0 5.373 0 12c0 5.99 4.388 10.954 10.125 11.854V15.47H7.078V12h3.047V9.356c0-3.007 1.792-4.668 4.533-4.668 1.312 0 2.686.234 2.686.234v2.953H15.83c-1.491 0-1.956.925-1.956 1.874V12h3.328l-.532 3.47h-2.796v8.385C19.612 22.954 24 17.99 24 12c0-6.627-5.373-12-12-12z"/>
          </svg>
          <span data-i18n="navFacebook">פייסבוק</span>
        </a>
        <a href="admin.html" class="nav-link nav-link-admin" data-i18n="navAdmin">ניהול</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <h2 data-i18n="heroTitle">חיים שניים לדברים יפים</h2>
      <p data-i18n="heroSubtitle">כל פריט בחנות מחכה לבית חדש. מצאו את מה שאתם אוהבים.</p>
    </div>
  </section>

  <main id="main" class="container">

    <section class="filters" aria-label="filter">
      <button class="chip chip-active" data-cat="all" data-i18n="filterAll">הכל</button>
      <!-- categories injected by JS -->
    </section>

    <section id="grid" class="grid" aria-live="polite">
      <!-- items injected by JS -->
    </section>

    <p id="empty-state" class="empty-state" hidden data-i18n="emptyCustomer">
      אין כרגע פריטים בקטגוריה הזו. תחזרו לבדוק בקרוב!
    </p>

  </main>

  <!-- Item detail modal -->
  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true">
      <button class="modal-close" data-close data-i18n-attr="aria-label:closeLabel" aria-label="סגור">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <p data-i18n="footerTagline">בבושקה • חנות יד שניה ברגבה</p>
      <p>
        <a href="https://www.facebook.com/babushka.regba/" target="_blank" rel="noopener" data-i18n="footerFollow">עקבו אחרינו בפייסבוק</a>
      </p>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/customer.js"></script>
</body>
</html>
