<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="בבושקה">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#A8C5CE"/>
      <stop offset="100%" stop-color="#8FB1BC"/>
    </radialGradient>
    <pattern id="dots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="0.7" fill="#F2E8D0" opacity="0.45"/>
    </pattern>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bg)"/>
  <circle cx="60" cy="60" r="58" fill="url(#dots)"/>
  <circle cx="60" cy="60" r="56" fill="none" stroke="#F2E8D0" stroke-width="1.2"/>

  <!-- Body (bottom rounded shape, terracotta) -->
  <path d="M 32 70
           Q 32 50, 60 50
           Q 88 50, 88 70
           L 88 96
           Q 88 104, 80 104
           L 40 104
           Q 32 104, 32 96 Z"
        fill="#B84A36"/>

  <!-- Body decorative panel (cream center) -->
  <path d="M 46 72
           Q 46 64, 60 64
           Q 74 64, 74 72
           L 74 98
           Q 74 102, 70 102
           L 50 102
           Q 46 102, 46 98 Z"
        fill="#F2E8D0"/>

  <!-- Body flower decoration -->
  <g transform="translate(60 84)">
    <circle r="3.5" fill="#D4A03A"/>
    <g fill="#8C9E5C">
      <ellipse cx="0" cy="-6" rx="2" ry="4"/>
      <ellipse cx="0" cy="6" rx="2" ry="4"/>
      <ellipse cx="-6" cy="0" rx="4" ry="2"/>
      <ellipse cx="6" cy="0" rx="4" ry="2"/>
    </g>
    <circle r="2" fill="#B84A36"/>
  </g>

  <!-- Body gold trim -->
  <path d="M 33 70 L 46 70 M 74 70 L 87 70" stroke="#D4A03A" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 35 100 L 85 100" stroke="#D4A03A" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Headscarf (sage green, framing the face) -->
  <path d="M 36 56
           Q 36 28, 60 28
           Q 84 28, 84 56
           Q 80 50, 60 50
           Q 40 50, 36 56 Z"
        fill="#8C9E5C"/>

  <!-- Scarf pattern (gold dots) -->
  <g fill="#D4A03A">
    <circle cx="46" cy="40" r="1.5"/>
    <circle cx="60" cy="36" r="1.8"/>
    <circle cx="74" cy="40" r="1.5"/>
    <circle cx="52" cy="46" r="1.2"/>
    <circle cx="68" cy="46" r="1.2"/>
  </g>

  <!-- Face (cream oval) -->
  <ellipse cx="60" cy="56" rx="16" ry="15" fill="#F4E3C4"/>

  <!-- Cheeks (rosy) -->
  <circle cx="50" cy="60" r="2.4" fill="#E08877" opacity="0.7"/>
  <circle cx="70" cy="60" r="2.4" fill="#E08877" opacity="0.7"/>

  <!-- Eyes (closed, smiling curves) -->
  <path d="M 50 54 Q 53 57, 56 54" stroke="#3A2A1C" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 64 54 Q 67 57, 70 54" stroke="#3A2A1C" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Mouth (small smile) -->
  <path d="M 56 64 Q 60 66.5, 64 64" stroke="#B84A36" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Hairline peek -->
  <path d="M 49 49 Q 55 47, 60 48 Q 65 47, 71 49" stroke="#3A2A1C" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>
</svg>
