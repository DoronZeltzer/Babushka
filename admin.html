<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ניהול • בבושקה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@300;400;500;700&family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/i18n.js"></script>
</head>
<body class="admin-body" data-page="admin">

  <header class="site-header">
    <div class="header-inner">
      <a class="logo-link" href="index.html">
        <img src="assets/logo.jpg" alt="" class="logo-img">
        <img src="assets/logo-text.jpg" alt="בבושקה - פאנל ניהול" class="logo-wordmark"
             data-i18n-attr="alt:pageTitleAdmin">
      </a>
      <nav class="header-nav">
        <button id="lang-toggle" class="nav-link nav-link-lang" data-i18n="langSwitch">EN</button>
        <a href="index.html" class="nav-link" data-i18n="navToSite">← לאתר</a>
        <button id="logout-btn" class="nav-link nav-link-admin" hidden data-i18n="navLogout">יציאה</button>
      </nav>
    </div>
  </header>

  <main class="container">

    <!-- Login screen -->
    <section id="login-screen" class="login-card">
      <h2 data-i18n="loginHeading">כניסת מנהל</h2>
      <p class="muted" data-i18n="loginIntro">הזיני את הסיסמה כדי לערוך את החנות.</p>
      <form id="login-form">
        <label for="password" data-i18n="loginLabel">סיסמה</label>
        <input type="password" id="password" autocomplete="current-password" required>
        <button type="submit" class="btn btn-primary" data-i18n="loginButton">כניסה</button>
        <p id="login-error" class="error" hidden data-i18n="loginError">סיסמה שגויה</p>
      </form>
    </section>

    <!-- Admin panel -->
    <section id="admin-panel" hidden>

      <div class="admin-toolbar">
        <h2 data-i18n="myItems">הפריטים שלי</h2>
        <button id="new-item-btn" class="btn btn-primary" data-i18n="newItem">+ פריט חדש</button>
      </div>

      <!-- Item form (shown for new + edit) -->
      <form id="item-form" class="item-form" hidden>
        <h3 id="form-title" data-i18n="formNewTitle">פריט חדש</h3>

        <div class="form-row">
          <label for="f-title" data-i18n="fieldTitle">שם הפריט *</label>
          <input type="text" id="f-title" required maxlength="80">
        </div>

        <div class="form-row form-row-double">
          <div>
            <label for="f-price" data-i18n="fieldPrice">מחיר (₪) *</label>
            <input type="number" id="f-price" required min="0" step="1">
          </div>
          <div>
            <label for="f-category" data-i18n="fieldCategory">קטגוריה *</label>
            <select id="f-category" required></select>
          </div>
        </div>

        <div class="form-row">
          <label for="f-description" data-i18n="fieldDescription">תיאור</label>
          <textarea id="f-description" rows="4" maxlength="500"></textarea>
        </div>

        <div class="form-row">
          <label for="f-images" data-i18n="fieldImages">תמונות (אפשר לבחור כמה)</label>
          <input type="file" id="f-images" accept="image/*" multiple>
          <div id="image-previews" class="image-previews"></div>
        </div>

        <div class="form-row form-row-inline">
          <input type="checkbox" id="f-sold">
          <label for="f-sold" data-i18n="fieldSold">פריט נמכר (יוצג עם תווית "נמכר")</label>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" data-i18n="save">שמירה</button>
          <button type="button" id="cancel-btn" class="btn btn-ghost" data-i18n="cancel">ביטול</button>
        </div>
      </form>

      <div id="admin-grid" class="admin-grid"></div>

      <p id="admin-empty" class="empty-state" hidden data-i18n="emptyAdmin">
        אין עדיין פריטים. לחצי על "פריט חדש" כדי להתחיל.
      </p>

    </section>

  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p data-i18n="footerAdmin">בבושקה • פאנל ניהול</p>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
